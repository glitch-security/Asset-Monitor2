# =============================================================================
# AssetMonitor — Docker Compose
#
# Before first run on Linux:
#   mkdir -p data && chown 1000:1000 data
#
# Windows / macOS with Docker Desktop — no extra steps needed.
# =============================================================================

services:
  assetmonitor:
    build:
      context: .
      dockerfile: Dockerfile

    image: assetmonitor:latest

    container_name: assetmonitor

    restart: unless-stopped

    environment:
      TZ: UTC
      LOG_LEVEL: INFO
      PYTHONUNBUFFERED: "1"

    # Resource limits (non-swarm / plain docker compose syntax)
    mem_limit: 768m
    cpus: "2.0"
    memswap_limit: 768m

    # NET_RAW enables SYN-mode nmap scanning (-sS) from the non-root user.
    # The nmap binary already has cap_net_raw+ep set by the Dockerfile.
    # Remove this if you prefer TCP-connect-only scanning with no capabilities.
    cap_add:
      - NET_RAW

    ports:
      # Web dashboard — open http://localhost:5000 in your browser
      - "5000:5000"

    volumes:
      # Configuration (read-only)
      - ./config.yaml:/app/config.yaml:ro

      # Persistent database — must be writable by UID 1000 on Linux
      - ./data:/app/data

      # Wordlists (read-only)
      - ./wordlists:/app/wordlists:ro

      # Target input files (read-only)
      - ./domains.txt:/app/domains.txt:ro
      - ./subdomains.txt:/app/subdomains.txt:ro
      - ./websites.txt:/app/websites.txt:ro

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/summary', timeout=5)"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 45s

    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
